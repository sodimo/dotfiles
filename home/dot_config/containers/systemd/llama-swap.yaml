# llama-swap routing config
#
# Hardware: AMD Strix Halo (gfx1151), 128 GB unified memory.
# Backend: Vulkan via mostlygeek/llama-swap:vulkan (bundles llama-server).
# Flag baselines are sourced from kyuz0/amd-strix-halo-toolboxes
# (docs/models.ini.example). See docs/kyuz0-toolbox.md for the
# interpolation map and resync procedure.
#
# Groups control concurrency + TTL:
#   - task:   always-loaded (TTL=0), small, fast.
#   - heavy:  on-demand, TTL=600s, exclusive swap (one-at-a-time).
#
# Model files live on the harness at %h/.local/share/llama-models/ and
# are mounted read-only at /models inside the llama-swap container.
#
# Active model set as of 2026-05-05: only gemma-4-e2b is fully on disk.
# Qwen3.6-27B and the larger Gemma 3 variants are rsync'ing in; their
# entries land here once the transfers complete. Older Qwen3-4B,
# gpt-oss-120b, Qwen3-Coder-30B, Qwen3-Embedding entries were removed
# (no longer the chosen model set).

healthCheckTimeout: 120

groups:
  task:
    swap: false
    exclusive: false
  heavy:
    swap: true
    exclusive: true

models:
  # ── Gemma 3 E2B (Unsloth UD-Q8_K_XL, ~5 GB) ──────────────────────────
  # Small Gemma 3 instruct quant, fully rsync'd 2026-05-05.
  # ttl=0 + group=task so it stays warm for OpenWebUI.
  gemma-4-e2b:
    aliases: [gemma-4-e2b, local-gemma-small]
    cmd: |
      /app/llama-server
      --host 0.0.0.0
      --port 8005
      -m /models/gemma-4-E2B-it-GGUF/gemma-4-E2B-it-UD-Q8_K_XL.gguf
      --ctx-size 32768
      --temp 1.0
      --top-p 0.95
      --top-k 64
      -ngl 999
      --no-mmap
      -fa on
      --batch-size 4096
      --ubatch-size 512
      --cache-type-k q8_0
      --cache-type-v q8_0
      --jinja
      --direct-io
      --cache-prompt
      --cache-reuse 256
      --threads 12
    proxy: http://127.0.0.1:8005
    ttl: 0
    group: task
