# Dovecot — Sodimo posture
# Real users live in /etc/dovecot/users.d/*.conf (chezmoi-rendered,
# age-encrypted). Mail storage: maildir per-user.

protocols = imap lmtp

mail_location = maildir:/var/mail/%u
mail_uid = 8
mail_gid = 12

ssl = yes
ssl_cert = </etc/dovecot/ssl/cert.pem
ssl_key = </etc/dovecot/ssl/key.pem

service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }
}

service lmtp {
  inet_listener lmtp {
    port = 24
  }
}

userdb {
  driver = passwd-file
  args = /etc/dovecot/users
}

passdb {
  driver = passwd-file
  args = scheme=SHA512-CRYPT /etc/dovecot/users
}

# BCC every inbound + outbound to Piler's archive address
plugin {
  sieve_global = /etc/dovecot/sieve-global
}
