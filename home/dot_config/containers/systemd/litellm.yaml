# LiteLLM routing config
# - All active routes are local, served by llama-swap.
# - Cloud entries (Anthropic, OpenAI) are commented out — sodimo runs
#   local-only as of 2026-05-05. Placeholders kept (env file too) for
#   easy re-enable later. Commenting hides them from OpenWebUI's selector.
#
# Active local models (2026-05-05):
#   task  : gemma-4-e2b               (always-loaded, low latency)
#   heavy : Qwen3.6-27b               (vision, mmproj-BF16)
#   heavy : gemma-4-31b-it-spec       (text, thinking, spec-decoded via E2B)
#   heavy : gemma-4-31b-it-spec-nonthinking
#   heavy : gemma-4-26b-a4b-spec      (text, thinking, MoE + spec-decoded)
#   heavy : gemma-4-26b-a4b-spec-nonthinking
#
# Older local-task / local-heavy / local-embeddings routes (qwen3-4b,
# gpt-oss-120b, qwen3-embedding) were removed — no longer in use.

model_list:
  # ── Local: Gemma 3 E2B (small, fast, always-loaded) ──────────────────
  - model_name: gemma-4-e2b
    litellm_params:
      model: openai/gemma-4-e2b
      api_base: http://llama-swap:8080/v1
      api_key: dummy

  # ── Cloud: escalation tier (disabled 2026-05-05) ────────────────────
  # Sodimo is local-only. Entries below are kept commented so they can be
  # re-enabled by uncommenting (env file still carries CHANGEME placeholders
  # for the API keys). Commenting hides them from OpenWebUI's model menu.
  # - model_name: claude-opus-4-7
  #   litellm_params:
  #     model: anthropic/claude-opus-4-7
  #     api_key: os.environ/ANTHROPIC_API_KEY
  #
  # - model_name: claude-sonnet-4-6
  #   litellm_params:
  #     model: anthropic/claude-sonnet-4-6
  #     api_key: os.environ/ANTHROPIC_API_KEY
  #
  # - model_name: gpt-5
  #   litellm_params:
  #     model: openai/gpt-5
  #     api_key: os.environ/OPENAI_API_KEY

  # ── Local: vision tier (Qwen3.6-27B with mmproj, on-demand) ─────────
  - model_name: Qwen3.6-27b
    litellm_params:
      model: openai/Qwen3.6-27b
      api_base: http://llama-swap:8080/v1
      api_key: dummy
    model_info:
      supports_vision: true
      input_cost_per_token: 0
      output_cost_per_token: 0

  # ── Local: Gemma 4 speculative-decoding variants (text-only) ────────
  # Speculative decoding doubles TG throughput on Strix Halo (~6 → ~12 t/s
  # on 31B dense per Zetaphor's Apr 2026 benchmark). draft-max=4 is the
  # bandwidth-bound sweet spot. mmproj is incompatible with spec decoding,
  # so these endpoints are text-only — use Qwen3.6-27b for image input.
  - model_name: gemma-4-31b-it-spec
    litellm_params:
      model: openai/gemma-4-31b-it-spec
      api_base: http://llama-swap:8080/v1
      api_key: dummy
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0

  - model_name: gemma-4-31b-it-spec-nonthinking
    litellm_params:
      model: openai/gemma-4-31b-it-spec-nonthinking
      api_base: http://llama-swap:8080/v1
      api_key: dummy
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0

  - model_name: gemma-4-26b-a4b-spec
    litellm_params:
      model: openai/gemma-4-26b-a4b-spec
      api_base: http://llama-swap:8080/v1
      api_key: dummy
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0

  - model_name: gemma-4-26b-a4b-spec-nonthinking
    litellm_params:
      model: openai/gemma-4-26b-a4b-spec-nonthinking
      api_base: http://llama-swap:8080/v1
      api_key: dummy
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0

litellm_settings:
  drop_params: true
  set_verbose: false
  telemetry: false
  # Token-usage + cost on every completion
  success_callback: ["langfuse"]  # placeholder; real hook lands the row in D1

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
