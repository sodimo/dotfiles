# LiteLLM routing config
# - Local tier routes via llama-swap.
# - Cloud tiers are named explicitly so the Worker can pick one by name.
#
# Active local model as of 2026-05-05: only gemma-4-e2b.
# Larger Gemma/Qwen variants land here once their rsyncs complete.
# Older local-task / local-heavy / local-embeddings routes (qwen3-4b,
# gpt-oss-120b, qwen3-embedding) were removed — no longer in use.

model_list:
  # ── Local: Gemma 3 E2B (small, fast, always-loaded) ──────────────────
  - model_name: gemma-4-e2b
    litellm_params:
      model: openai/gemma-4-e2b
      api_base: http://llama-swap:8080/v1
      api_key: dummy

  # ── Cloud: escalation tier ───────────────────────────────────────────
  - model_name: claude-opus-4-7
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: gpt-5
    litellm_params:
      model: openai/gpt-5
      api_key: os.environ/OPENAI_API_KEY

litellm_settings:
  drop_params: true
  set_verbose: false
  telemetry: false
  # Token-usage + cost on every completion
  success_callback: ["langfuse"]  # placeholder; real hook lands the row in D1

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
