name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint (if configured)
        run: |
          if [ -f package.json ] && grep -q '"lint"' package.json; then
            npm ci && npm run lint
          elif [ -f pyproject.toml ] && command -v ruff &>/dev/null; then
            ruff check .
          else
            echo "No lint configured — skipping"
          fi

      - name: Test (if configured)
        run: |
          if [ -f package.json ] && grep -q '"test"' package.json; then
            npm run test
          elif [ -f pyproject.toml ]; then
            python -m pytest || echo "No tests found"
          else
            echo "No test runner configured — skipping"
          fi

      - name: Check D-167 digest pins
        run: ./scripts/check-digest-pins.sh

      - name: Validate Caddyfile + routes
        run: ./scripts/check-caddyfile.sh
