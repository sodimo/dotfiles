name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple

  calver-tag:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create calver alias tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLUG: ${{ github.event.repository.name }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          CALVER_TAG="${DATE}-${SLUG}"
          SEMVER_TAG="${{ needs.release-please.outputs.tag_name }}"
          git tag "${CALVER_TAG}" "${SEMVER_TAG}"
          git push origin "${CALVER_TAG}"
