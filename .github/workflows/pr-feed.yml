name: PR Feed

on:
  pull_request:
    types: [closed]

jobs:
  append-feed:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Append to .changelog/prs.jsonl
        run: |
          mkdir -p .changelog
          echo '{"repo":"${{ github.repository }}","pr":${{ github.event.pull_request.number }},"title":"${{ github.event.pull_request.title }}","author":"${{ github.event.pull_request.user.login }}","merged_at":"${{ github.event.pull_request.merged_at }}","url":"${{ github.event.pull_request.html_url }}"}' \
            >> .changelog/prs.jsonl

      - name: Commit feed update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .changelog/prs.jsonl
          git diff --cached --quiet || git commit -m "chore(changelog): pr #${{ github.event.pull_request.number }} merged"
          git push

      - name: Dispatch to changelog repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CHANGELOG_DISPATCH_TOKEN }}
          repository: sodimo/changelog-sodimo-eu
          event-type: pr-merged
          client-payload: |
            {
              "repo": "${{ github.repository }}",
              "pr": ${{ github.event.pull_request.number }},
              "title": "${{ github.event.pull_request.title }}",
              "merged_at": "${{ github.event.pull_request.merged_at }}"
            }
